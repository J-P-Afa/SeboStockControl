services:
  postgres:
    image: postgres:16-alpine
    container_name: sebo-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: sebo
      POSTGRES_PASSWORD: sebo_secret
      POSTGRES_DB: sebo_stock
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
