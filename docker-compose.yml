services:
  postgres:
    image: postgres:16-alpine
    container_name: sebo-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: sebo
      POSTGRES_PASSWORD: sebo_secret
      POSTGRES_DB: sebo_stock
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sebo -d sebo_stock"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: sebostockcontrol-backend:latest
    container_name: sebo-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://sebo:sebo_secret@postgres:5432/sebo_stock?schema=public
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  frontend:
    image: sebostockcontrol-frontend:latest
    container_name: sebo-frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: sebo-nginx
    restart: unless-stopped
    ports:
      - '3000:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
