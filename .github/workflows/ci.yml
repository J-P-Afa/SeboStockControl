name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        
      - name: Type-check
        run: npm run type-check
        
      - name: Vitest & Coverage
        run: npm run test:coverage
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        
      - name: Build
        run: npm run build
        
      - name: Playwright E2E
        run: npm run test:e2e
        env:
          CI: true
          
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Lint
        run: npm run lint
        
      - name: Unit Tests
        run: npm run test:cov

  deploy:
    name: Deploy to EC2
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".,!node_modules,!.git,!.github,!test-results"
          target: "~/app"

      - name: Execute deployment on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            
            # Garantindo a criação dos arquivos .env
            mkdir -p backend frontend
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > backend/.env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
            echo "NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:3001" > frontend/.env
            
            # Build e inicialização dos contêineres
            docker compose up -d --build
